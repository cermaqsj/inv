<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Acceso - Registro Herramientas</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --primary: #0ea5e9;
            --dark: #0f172a;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--dark);
        }

        .container {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 90%;
            width: 400px;
        }

        h1 {
            margin: 0 0 1rem 0;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            margin: 0 0 2rem 0;
            color: #64748b;
            font-weight: 300;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
            /* Make image responsive but crisp */
        }

        #qrcode img {
            max-width: 100%;
            border: 1px solid #e2e8f0;
            padding: 10px;
            background: white;
            border-radius: 10px;
        }

        .btn {
            background: var(--dark);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: scale(1.05);
            background: black;
        }

        /* Print Styles */
        @media print {
            body {
                background: white;
                display: block;
                padding: 2rem;
            }

            .container {
                box-shadow: none;
                margin: 0 auto;
                border: 2px solid #ccc;
            }

            .no-print {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Bitácora Herramientas</h1>
        <p>Escanea para registrar Préstamos y Devoluciones</p>

        <div id="qrcode"></div>

        <div class="no-print">
            <button class="btn" onclick="window.print()">
                IMPRIMIR FICHA
            </button>
        </div>

        <div style="margin-top: 20px; font-size: 0.8rem; color: #94a3b8;">
            Bodega Mantención Cermaq
        </div>
    </div>

    <script>
        // Generated URL
        const urlKey = "https://cermaqsj.github.io/inv/registro_herramientas.html";

        // Generate QR
        new QRCode(document.getElementById("qrcode"), {
            text: urlKey,
            width: 256,
            height: 256,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
</body>

</html>
