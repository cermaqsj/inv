<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cermaq Hub</title>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="cermaq-style.css?v=9.11">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="Q.png">

    <script src="dashboard.js?v=1.0" defer></script>
</head>

<body>
    <!-- Background Particles -->
    <canvas id="bg-particles"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.8;"></canvas>

    <main
        style="max-width: 600px; margin: 0 auto; padding: 2rem 1.5rem; display: flex; flex-direction: column; height: 100vh; justify-content: center;">

        <!-- Header -->
        <div style="text-align: center; margin-bottom: 2rem; z-index: 1;">
            <img src="Cermaq_logo2.png" alt="Cermaq"
                style="height: 50px; filter: brightness(0) invert(1); margin-bottom: 0.5rem;">
            <div
                style="font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.8; font-weight: 600;">
                Centro De Operaciones
            </div>
            <div style="font-size: 0.8rem; color: var(--accent); margin-top: 5px;" id="clock">
                --:--
            </div>
        </div>

        <!-- Dashboard Grid -->
        <div style="display: flex; flex-direction: column; gap: 1.5rem; z-index: 1;">

            <!-- Card 1: Inventario -->
            <button onclick="window.location.href='index.html'" class="dashboard-card"
                style="--card-color: var(--primary);">
                <div class="card-icon">
                    <span class="material-icons-round">inventory_2</span>
                </div>
                <div class="card-info">
                    <h3>Inventario & Herramientas</h3>
                    <p>Control de stock y préstamos</p>
                </div>
                <div class="card-arrow">
                    <span class="material-icons-round">arrow_forward_ios</span>
                </div>
            </button>

            <!-- Card 2: Bitácora O2 -->
            <button onclick="window.location.href='monitor.html'" class="dashboard-card"
                style="--card-color: var(--success);">
                <div class="card-icon">
                    <span class="material-icons-round">air</span>
                </div>
                <div class="card-info">
                    <h3>Bitácora O2 / Oxígeno</h3>
                    <p>Monitoreo de parámetros</p>
                </div>
                <div class="card-arrow">
                    <span class="material-icons-round">arrow_forward_ios</span>
                </div>
            </button>

            <!-- Card 3: Bitácora Mantención -->
            <button onclick="window.location.href='bitacora_mantencion.html'" class="dashboard-card"
                style="--card-color: var(--accent);">
                <div class="card-icon">
                    <span class="material-icons-round">engineering</span>
                </div>
                <div class="card-info">
                    <h3>Bitácora Mantención</h3>
                    <p>Reportes de trabajo diario</p>
                </div>
                <div class="card-arrow">
                    <span class="material-icons-round">arrow_forward_ios</span>
                </div>
            </button>

        </div>

        <!-- Footer / Version -->
        <div style="margin-top: auto; text-align: center; opacity: 0.5; font-size: 0.75rem; padding-top: 2rem;">
            Cermaq App Hub v1.0 • PWA Enabled
        </div>

    </main>

    <!-- Inline Styles for Dashboard Specifics -->
    <style>
        .dashboard-card {
            display: flex;
            align-items: center;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 1.5rem;
            color: white;
            text-align: left;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .dashboard-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
            background: var(--card-color);
            opacity: 0.8;
        }

        .dashboard-card:active {
            transform: scale(0.98);
            background: rgba(30, 41, 59, 0.9);
        }

        .card-icon {
            background: rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 1.2rem;
        }

        .card-icon span {
            font-size: 1.8rem;
            color: var(--card-color);
        }

        .card-info {
            flex: 1;
        }

        .card-info h3 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .card-info p {
            margin: 4px 0 0 0;
            font-size: 0.85rem;
            opacity: 0.7;
            font-weight: 300;
        }

        .card-arrow span {
            font-size: 1rem;
            opacity: 0.5;
        }
    </style>
</body>

</html>
