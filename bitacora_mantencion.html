<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bitácora Mantención - Cermaq</title>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <!-- Local Styles -->
    <link rel="stylesheet" href="cermaq-style.css?v=9.11">

    <!-- PWA & Mobile -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="Q.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="bitacora_mantencion.js?v=1.1" defer></script>
</head>


<body>
    <!-- Background Particles -->
    <canvas id="bg-particles"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.8;"></canvas>

    <nav>
        <div style="text-align: center;">
            <img src="Cermaq_logo2.png" alt="Logo" class="nav-logo">
            <div
                style="font-size: 0.7rem; color: var(--accent); font-weight: 700; letter-spacing: 1px; margin-top: 4px; text-transform: uppercase;">
                BITÁCORA MANTENCIÓN
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 5px;">
            <button class="icon-btn" onclick="openSheet()"
                style="border: 1px solid var(--glass-border); border-radius: 50%; color: #10b981;"
                title="Abrir Planilla">
                <span class="material-icons-round">table_view</span>
            </button>
            <button class="icon-btn" onclick="toggleTheme()" id="btn-theme-toggle"
                style="border: 1px solid var(--glass-border); border-radius: 50%;">
                <span class="material-icons-round">dark_mode</span>
            </button>
            <button class="icon-btn" onclick="window.location.href='index.html'"
                style="border: 1px solid var(--glass-border); border-radius: 50%;" title="Volver al Inventario">
                <span class="material-icons-round">inventory_2</span>
            </button>
        </div>

    </nav>

    <!-- Theme Init -->
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        window.addEventListener('DOMContentLoaded', () => {
            const icon = document.getElementById('btn-theme-toggle').querySelector('span');
            icon.innerText = savedTheme === 'dark' ? 'light_mode' : 'dark_mode';
        });
    </script>

    <main style="padding-bottom: 80px;">
        <div class="product-header"
            style="display: flex; justify-content: center; align-items: center; margin-bottom: 1rem;">
            <h2 style="display:block; font-size: 1.3rem; margin:0;">Registro Diario de Actividades</h2>
        </div>

        <!-- Form Container -->
        <div>
            <div class="card" style="margin-bottom: 1rem;">
                <div class="input-group">
                    <label class="input-label">Técnico / Responsable</label>
                    <input type="text" id="maint-worker" class="input-field" placeholder="Tu Nombre">
                </div>
            </div>

            <!-- Task Batch Input -->
            <div class="card" style="margin-bottom: 1rem;">
                <div class="input-group">
                    <label class="input-label">Tarea Realizada</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="maint-task" class="input-field" placeholder="Menciona la actividad..."
                            style="flex: 1;">
                        <button class="btn btn-secondary" onclick="addTaskToBatch()"
                            style="width: 50px; padding: 0; display: flex; align-items: center; justify-content: center; background: var(--primary); color: white; border: none;">
                            <span class="material-icons-round">add</span>
                        </button>
                    </div>
                </div>
                <!-- Batch List Container -->
                <div id="maint-batch-list" style="margin-top: 10px; display: flex; flex-direction: column; gap: 8px;">
                </div>
            </div>

            <button class="btn btn-primary" id="btn-maint-submit" onclick="submitMaintenanceLog()"
                style="width: 100%; margin-top: 1rem; padding: 1.2rem; font-size: 1.1rem; font-weight: bold;">
                <span class="material-icons-round">send</span> ENVIAR REPORTE
            </button>

            <button class="btn btn-secondary" onclick="openHistoryModal()"
                style="width: 100%; margin-top: 1rem; padding: 1rem; font-size: 1rem;">
                <span class="material-icons-round">history</span> VER HISTORIAL
            </button>
        </div>
    </main>

    <!-- History View Modal -->
    <div class="modal-backdrop" id="modal-history"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
        <div class="modal-content"
            style="width:90%; max-width:500px; height:85vh; background:var(--bg-body); border-radius:16px; padding:20px; display:flex; flex-direction:column; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 style="margin:0; font-size:1.4rem;">Historial Reciente</h2>
                <button onclick="closeHistoryModal()"
                    style="background:none; border:none; cursor:pointer; color:var(--text-primary);">
                    <span class="material-icons-round">close</span>
                </button>
            </div>

            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button class="btn btn-secondary" onclick="exportPDF()"
                    style="flex:1; border-color:var(--danger); color:var(--danger); font-size:0.9rem;">
                    <span class="material-icons-round">picture_as_pdf</span> PDF
                </button>
                <button class="btn btn-primary" onclick="loadHistory()" style="flex:1; font-size:0.9rem;">
                    <span class="material-icons-round">refresh</span> Actualizar
                </button>
            </div>

            <div id="history-list"
                style="flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; padding-right:5px;">
                <!-- Content injected via JS -->
                <div style="text-align:center; padding:20px; color:var(--text-light);">Cargando historial...</div>
            </div>

        </div>
    </div>


    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Particles Script Inline -->
    <script>
        (function () {
            const canvas = document.getElementById('bg-particles');
            const ctx = canvas.getContext('2d', { alpha: true });
            let particles = [];
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();
            const particleCount = window.innerWidth < 768 ? 20 : 40;
            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 0.3;
                    this.vy = (Math.random() - 0.5) * 0.3;
                    this.size = Math.random() * 2 + 1;
                    this.baseColor = 'rgba(255, 255, 255, 0.5)';
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0) this.x = canvas.width;
                    if (this.x > canvas.width) this.x = 0;
                    if (this.y < 0) this.y = canvas.height;
                    if (this.y > canvas.height) this.y = 0;
                }
                draw() {
                    ctx.fillStyle = this.baseColor;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            for (let i = 0; i < particleCount; i++) particles.push(new Particle());
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const theme = document.documentElement.getAttribute('data-theme');
                const isLight = theme === 'light';
                ctx.fillStyle = isLight ? 'rgba(15, 23, 42, 0.4)' : 'rgba(255, 255, 255, 0.4)';
                for (let i = 0; i < particles.length; i++) {
                    let p = particles[i];
                    p.update();
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                requestAnimationFrame(animate);
            }
            animate();
        })();
    </script>
</body>

</html>
