<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bitácora Herramientas - Cermaq</title>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <!-- Local Styles -->
    <link rel="stylesheet" href="cermaq-style.css?v=11.1-ULTRA">

    <!-- PWA & Mobile -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Herramientas">
    <link rel="apple-touch-icon" href="cermaq_logo.png">
    <link rel="icon" type="image/png" href="cermaq_logo.png">

    <script src="registro_herramientas.js?v=1.0" defer></script>
</head>

<body>
    <!-- Background Particles (Optional, keeping for consistency) -->
    <canvas id="bg-particles"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.8;"></canvas>

    <nav>
        <div class="nav-brand">
            <img src="Cermaq_logo2.png" alt="Logo" class="nav-logo">
            <div class="nav-title" style="color: #ef4444 !important;">BITÁCORA HERRAMIENTAS</div>
        </div>

        <div class="nav-actions">
            <button class="icon-btn" onclick="toggleTheme()" id="btn-theme-toggle" title="Cambiar Tema">
                <span class="material-icons-round">dark_mode</span>
            </button>
            <button class="icon-btn" onclick="window.location.href='index.html'" title="Volver al Inventario">
                <span class="material-icons-round">inventory_2</span>
            </button>
        </div>
    </nav>

    <!-- Theme Init -->
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        window.addEventListener('DOMContentLoaded', () => {
            const icon = document.getElementById('btn-theme-toggle').querySelector('span');
            icon.innerText = savedTheme === 'dark' ? 'light_mode' : 'dark_mode';
        });
    </script>

    <main style="padding-bottom: 80px; max-width: 500px; margin: 0 auto; width: 100%;">
        <div class="product-header"
            style="display: flex; justify-content: center; align-items: center; margin-bottom: 1.5rem;">
            <h2 style="display:block; font-size: 1.4rem; font-weight: 600; margin:0; letter-spacing: 0.5px;">Control de
                Préstamos</h2>
        </div>

        <!-- Premium Tabs -->
        <div
            style="display: flex; gap: 12px; margin-bottom: 2rem; background: rgba(0,0,0,0.1); padding: 6px; border-radius: 24px; border: 1px solid var(--glass-border);">
            <button class="btn btn-secondary" id="tab-loan" onclick="switchToolTab('loan')"
                style="flex: 1; padding: 0.8rem; font-size: 0.9rem; font-weight: 600; border: none; box-shadow: none; border-radius: 18px;">PRÉSTAMO</button>
            <button class="btn btn-secondary" id="tab-active" onclick="switchToolTab('active')"
                style="flex: 1; padding: 0.8rem; font-size: 0.9rem; font-weight: 600; border: none; box-shadow: none; border-radius: 18px; opacity: 0.6; background: transparent;">PENDIENTE</button>
        </div>

        <!-- Tab: Loan (Form) -->
        <div id="view-tool-loan" style="flex: 1; display: flex; flex-direction: column; gap: 1rem;">
            <div class="card">
                <div class="input-group">
                    <label class="input-label">Trabajador / Responsable</label>
                    <input type="text" id="tool-worker" class="input-field" placeholder="Nombre completo">
                </div>
            </div>

            <div class="card">
                <div class="input-group">
                    <label class="input-label">Área</label>
                    <input type="text" id="tool-area" class="input-field" placeholder="Ej. Smolt">
                </div>
            </div>

            <div class="card">
                <div class="input-group">
                    <label class="input-label">Herramienta / Insumo</label>
                    <div style="display: flex; gap: 12px;">
                        <input type="text" id="tool-name" class="input-field" placeholder="Ej. Pistola de Impacto"
                            style="flex: 1;">
                        <button class="btn btn-primary" onclick="addToolToBatch()"
                            style="width: 50px; height: 50px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 16px;">
                            <span class="material-icons-round">add</span>
                        </button>
                    </div>
                </div>
                <!-- Batch List Container -->
                <div id="tool-batch-list" style="margin-top: 10px; display: flex; flex-direction: column; gap: 8px;">
                </div>
            </div>

            <div class="card">
                <div class="input-group">
                    <label class="input-label">Comentario (Opcional)</label>
                    <input type="text" id="tool-comment" class="input-field" placeholder="Detalle estado o motivo">
                </div>
            </div>

            <button class="btn btn-primary" id="btn-tool-submit" onclick="registerToolOut()"
                style="width: 100%; margin-top: 1rem; padding: 1.2rem; font-size: 1rem; font-weight: bold; box-shadow: 0 10px 25px rgba(0, 169, 224, 0.4);">
                <span class="material-icons-round">output</span> REGISTRAR SALIDA
            </button>
        </div>

        <!-- Tab: Active & History (List) -->
        <div id="view-tool-active" style="display: none; flex: 1; flex-direction: column; gap: 1rem;">
            <div id="tool-list-container" class="cart-list"
                style="background: rgba(0,0,0,0.2); border-radius: 20px; padding: 1rem; border: 1px solid var(--glass-border);">
                <div style="text-align: center; color: var(--text-muted); padding: 3rem 1rem; font-weight: 500;">
                    <span class="material-icons-round"
                        style="font-size: 3rem; opacity: 0.5; margin-bottom: 1rem; display: block;">hourglass_empty</span>
                    Cargando Préstamos...
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Particles Script Inline (Simplified) -->
    <script>
        (function () {
            const canvas = document.getElementById('bg-particles');
            const ctx = canvas.getContext('2d', { alpha: true });
            let particles = [];

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            const particleCount = window.innerWidth < 768 ? 20 : 40;

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 0.3;
                    this.vy = (Math.random() - 0.5) * 0.3;
                    this.size = Math.random() * 2 + 1;
                    this.baseColor = 'rgba(255, 255, 255, 0.5)';
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0) this.x = canvas.width;
                    if (this.x > canvas.width) this.x = 0;
                    if (this.y < 0) this.y = canvas.height;
                    if (this.y > canvas.height) this.y = 0;
                }
                draw() {
                    ctx.fillStyle = this.baseColor;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            for (let i = 0; i < particleCount; i++) particles.push(new Particle());

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const theme = document.documentElement.getAttribute('data-theme');
                const isLight = theme === 'light';
                ctx.fillStyle = isLight ? 'rgba(15, 23, 42, 0.4)' : 'rgba(255, 255, 255, 0.4)';

                for (let i = 0; i < particles.length; i++) {
                    let p = particles[i];
                    p.update();
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                requestAnimationFrame(animate);
            }
            animate();
        })();
    </script>
</body>

</html>
